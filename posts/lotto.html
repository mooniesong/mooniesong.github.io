<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로또 번호 생성기</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f0f4f8;
      font-family: 'Segoe UI', sans-serif;
    }

    .container {
      text-align: center;
      background: white;
      padding: 48px 64px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    h1 {
      font-size: 1.4rem;
      color: #555;
      margin-bottom: 32px;
    }

    .balls-wrapper {
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
      margin-bottom: 36px;
      min-height: 152px;
    }

    .balls-row {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .ball {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      font-weight: bold;
      color: white;
      box-shadow: 0 3px 8px rgba(0,0,0,0.2);
    }

    .ball.range1 { background-color: #f5a623; } /* 1~10  노랑 */
    .ball.range2 { background-color: #4a90d9; } /* 11~20 파랑 */
    .ball.range3 { background-color: #e74c3c; } /* 21~30 빨강 */
    .ball.range4 { background-color: #7b7b7b; } /* 31~40 회색 */
    .ball.range5 { background-color: #27ae60; } /* 41~45 초록 */

    button {
      padding: 14px 36px;
      font-size: 1rem;
      background-color: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: #1d4ed8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>1 ~ 45 로또 번호 생성기</h1>
    <div class="balls-wrapper" id="balls-wrapper"></div>
    <button onclick="generateLotto()">번호 뽑기</button>
    <p><a href="../">홈으로 돌아가기</a></p>
  </div>

  <script>
    function generateLotto() {
      const numbers = [];

      while (numbers.length < 6) {
        const num = Math.floor(Math.random() * 45) + 1;
        if (!numbers.includes(num)) {
          numbers.push(num);
        }
      }

      numbers.sort((a, b) => a - b);

      const wrapper = document.getElementById('balls-wrapper');
      wrapper.innerHTML = '';

      // 1행: 앞 3개 / 2행: 뒤 3개
      [numbers.slice(0, 3), numbers.slice(3, 6)].forEach(rowNums => {
        const row = document.createElement('div');
        row.classList.add('balls-row');

        rowNums.forEach(num => {
          const ball = document.createElement('div');
          ball.classList.add('ball', getBallRange(num));
          ball.textContent = num;
          row.appendChild(ball);
        });

        wrapper.appendChild(row);
      });
    }

    function getBallRange(num) {
      if (num <= 10) return 'range1';
      if (num <= 20) return 'range2';
      if (num <= 30) return 'range3';
      if (num <= 40) return 'range4';
      return 'range5';
    }
  </script>
</body>
</html>
